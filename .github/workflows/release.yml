name: Build and Release (Code Signed)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version to build (without leading v)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-signed:
    name: Build and Sign macOS App (${{ matrix.arch }})
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - arch: arm64
            cliproxy_arch: darwin_arm64
            swift_arch: arm64
            tested: true
          - arch: x86_64
            cliproxy_arch: darwin_amd64
            swift_arch: x86_64
            tested: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Import Code Signing Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Resolve release version
        id: release_meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            VERSION="${VERSION#v}"
          fi

          BUILD_NUMBER=$(git rev-list --count HEAD)

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION} (build ${BUILD_NUMBER}) for ${{ matrix.arch }}"

      - name: Resolve bundled CLIProxyAPIPlus version
        id: cliproxy
        run: |
          set -e

          OUTPUT=$(src/Sources/Resources/cli-proxy-api-plus 2>&1 || true)
          echo "$OUTPUT"

          VERSION=$(printf '%s\n' "$OUTPUT" | sed -nE 's/.*CLIProxyAPI Version: ([0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?)-plus,.*/\1/p' | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "Error: Failed to detect bundled CLIProxyAPIPlus version" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using bundled CLIProxyAPIPlus version: $VERSION"

      - name: Download CLIProxyAPIPlus for ${{ matrix.arch }}
        run: |
          set -e

          VERSION="${{ steps.cliproxy.outputs.VERSION }}"
          TAG="v${VERSION}"
          FILENAME="CLIProxyAPIPlus_${VERSION}_${{ matrix.cliproxy_arch }}.tar.gz"
          URL="https://github.com/router-for-me/CLIProxyAPIPlus/releases/download/${TAG}/${FILENAME}"

          echo "Downloading: $URL"
          curl -L -f --retry 3 --retry-delay 5 -o cliproxy.tar.gz "$URL"

          mkdir -p src/Sources/Resources
          TEMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TEMP_DIR" cliproxy.tar.gz' EXIT

          tar -xzf cliproxy.tar.gz -C "$TEMP_DIR"

          BINARY=$(find "$TEMP_DIR" -type f \( -name "CLIProxyAPIPlus" -o -name "cli-proxy-api-plus" \) | head -n 1)
          if [ -z "$BINARY" ]; then
            echo "Error: Could not find binary in tarball" >&2
            find "$TEMP_DIR" -maxdepth 2 -type f -print >&2
            exit 1
          fi

          echo "Found binary: $BINARY"
          cp "$BINARY" src/Sources/Resources/cli-proxy-api-plus
          chmod +x src/Sources/Resources/cli-proxy-api-plus

          file src/Sources/Resources/cli-proxy-api-plus
          ls -lh src/Sources/Resources/cli-proxy-api-plus

      - name: Build app bundle for ${{ matrix.arch }}
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APP_VERSION: ${{ steps.release_meta.outputs.VERSION }}
          TARGET_ARCH: ${{ matrix.swift_arch }}
        run: |
          chmod +x create-app-bundle.sh
          ./create-app-bundle.sh

      - name: Verify Code Signature
        run: |
          codesign --verify --deep --strict --verbose=2 DroidProxy.app
          codesign -dv --verbose=4 DroidProxy.app
          spctl -a -vvv -t install DroidProxy.app || echo "⚠️ Gatekeeper check failed (expected without notarization)"

      - name: Notarize App
        run: |
          ditto -c -k --sequesterRsrc --keepParent "DroidProxy.app" "DroidProxy-notarize.zip"

          echo "Submitting app for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "DroidProxy-notarize.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait --output-format json)

          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | jq -r '.id')
          STATUS=$(echo "$SUBMIT_OUTPUT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "❌ Notarization failed with status: $STATUS"
            echo "📋 Getting detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            exit 1
          fi

          echo "✅ Notarization succeeded! Stapling ticket..."
          xcrun stapler staple "DroidProxy.app"
          xcrun stapler validate "DroidProxy.app"
          echo "✅ App successfully notarized and stapled!"

          rm "DroidProxy-notarize.zip"

      - name: Create DMG
        run: |
          brew install create-dmg

          VOLICON_ARGS=()
          if [ -f "src/Sources/Resources/AppIcon.icns" ]; then
            VOLICON_ARGS=(--volicon "src/Sources/Resources/AppIcon.icns")
          fi

          create-dmg \
            --volname "DroidProxy" \
            "${VOLICON_ARGS[@]}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "DroidProxy.app" 175 120 \
            --hide-extension "DroidProxy.app" \
            --app-drop-link 425 120 \
            --codesign "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}" \
            "DroidProxy-${{ matrix.arch }}.dmg" \
            "DroidProxy.app" || true

          if [ -f "DroidProxy-${{ matrix.arch }}.dmg" ]; then
            echo "✅ DMG created successfully"
            codesign -dv "DroidProxy-${{ matrix.arch }}.dmg" || echo "⚠️ DMG not signed (non-fatal)"
          fi

      - name: Create ZIP archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent "DroidProxy.app" "DroidProxy-${{ matrix.arch }}.zip"

      - name: Calculate checksums
        run: |
          shasum -a 256 "DroidProxy-${{ matrix.arch }}.zip" > "DroidProxy-${{ matrix.arch }}.zip.sha256"
          if [ -f "DroidProxy-${{ matrix.arch }}.dmg" ]; then
            shasum -a 256 "DroidProxy-${{ matrix.arch }}.dmg" > "DroidProxy-${{ matrix.arch }}.dmg.sha256"
          fi

      - name: Sign update for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find src/.build -name "sign_update" -type f | grep -v old_dsa | head -n 1)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "Error: sign_update not found" >&2
            find src/.build -name "sign_update" -type f >&2
            exit 1
          fi

          echo "Using sign_update: $SIGN_UPDATE"
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "DroidProxy-${{ matrix.arch }}.zip" --ed-key-file -)

          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"$//')
          LENGTH=$(stat -f%z "DroidProxy-${{ matrix.arch }}.zip")

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"
          echo "Sparkle signature generated for ${{ matrix.arch }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: droidproxy-${{ matrix.arch }}
          path: |
            DroidProxy-${{ matrix.arch }}.zip
            DroidProxy-${{ matrix.arch }}.zip.sha256
            DroidProxy-${{ matrix.arch }}.dmg
            DroidProxy-${{ matrix.arch }}.dmg.sha256
          retention-days: 1

      - name: Save Sparkle signature
        run: |
          echo "${{ steps.sparkle_sign.outputs.ed_signature }}" > "sparkle_signature_${{ matrix.arch }}.txt"
          echo "${{ steps.sparkle_sign.outputs.length }}" > "sparkle_length_${{ matrix.arch }}.txt"

      - name: Upload Sparkle signature
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-signature-${{ matrix.arch }}
          path: |
            sparkle_signature_${{ matrix.arch }}.txt
            sparkle_length_${{ matrix.arch }}.txt
          retention-days: 1

  release:
    name: Create Release
    needs: build-signed
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release_meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            VERSION="${VERSION#v}"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/droidproxy-arm64/* release/
          cp artifacts/droidproxy-x86_64/* release/
          ls -la release/

      - name: Download Sparkle signatures
        uses: actions/download-artifact@v4
        with:
          pattern: sparkle-signature-*
          path: sparkle
          merge-multiple: true

      - name: Update appcast files
        run: |
          VERSION="${{ steps.release_meta.outputs.VERSION }}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          TODAY=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          ARM64_SIGNATURE=$(cat sparkle/sparkle_signature_arm64.txt)
          ARM64_LENGTH=$(cat sparkle/sparkle_length_arm64.txt)
          X86_64_SIGNATURE=$(cat sparkle/sparkle_signature_x86_64.txt)
          X86_64_LENGTH=$(cat sparkle/sparkle_length_x86_64.txt)

          cat > /tmp/new_item_arm64.xml <<ENDOFITEM
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <pubDate>${TODAY}</pubDate>
                <enclosure url="https://github.com/anand-92/droidproxy/releases/download/v${VERSION}/DroidProxy-arm64.zip"
                           type="application/octet-stream"
                           sparkle:edSignature="${ARM64_SIGNATURE}"
                           length="${ARM64_LENGTH}"/>
              </item>
          ENDOFITEM

          sed -i.bak '/<language>en<\/language>/r /tmp/new_item_arm64.xml' appcast.xml
          rm -f appcast.xml.bak /tmp/new_item_arm64.xml

          if [ ! -f appcast-x86_64.xml ]; then
            cat > appcast-x86_64.xml <<'ENDOFAPPCAST'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>DroidProxy Updates (Intel)</title>
              <link>https://github.com/anand-92/droidproxy</link>
              <description>Most recent updates to DroidProxy for Intel Macs</description>
              <language>en</language>
            </channel>
          </rss>
          ENDOFAPPCAST
          fi

          cat > /tmp/new_item_x86_64.xml <<ENDOFITEM
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <pubDate>${TODAY}</pubDate>
                <enclosure url="https://github.com/anand-92/droidproxy/releases/download/v${VERSION}/DroidProxy-x86_64.zip"
                           type="application/octet-stream"
                           sparkle:edSignature="${X86_64_SIGNATURE}"
                           length="${X86_64_LENGTH}"/>
              </item>
          ENDOFITEM

          sed -i.bak '/<language>en<\/language>/r /tmp/new_item_x86_64.xml' appcast-x86_64.xml
          rm -f appcast-x86_64.xml.bak /tmp/new_item_x86_64.xml

          head -30 appcast.xml
          echo "---"
          head -30 appcast-x86_64.xml

      - name: Commit appcast files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git add appcast.xml appcast-x86_64.xml
          git commit -m "Update appcast files for v${{ steps.release_meta.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.release_meta.outputs.VERSION }}
          files: |
            release/DroidProxy-arm64.zip
            release/DroidProxy-arm64.zip.sha256
            release/DroidProxy-arm64.dmg
            release/DroidProxy-arm64.dmg.sha256
            release/DroidProxy-x86_64.zip
            release/DroidProxy-x86_64.zip.sha256
            release/DroidProxy-x86_64.dmg
            release/DroidProxy-x86_64.dmg.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## DroidProxy ${{ steps.release_meta.outputs.VERSION }}

            ### Downloads

            | Architecture | DMG | ZIP |
            |--------------|-----|-----|
            | **Apple Silicon** (M1/M2/M3) | `DroidProxy-arm64.dmg` | `DroidProxy-arm64.zip` |
            | **Intel** (x86_64) ⚠️ | `DroidProxy-x86_64.dmg` | `DroidProxy-x86_64.zip` |

            > ⚠️ **Intel build is untested** - Please report if it works for you.

            ### Installation

            1. Download the appropriate file for your Mac
            2. For DMG: Mount and drag to Applications
            3. For ZIP: Extract and drag to Applications
            4. Double-click to launch

            ### What's New

            See the [CHANGELOG](https://github.com/anand-92/droidproxy/blob/main/CHANGELOG.md) for details.

            ### Verification

            This release is code signed with Apple Developer ID and includes SHA-256 checksums.

            ```bash
            shasum -a 256 -c DroidProxy-arm64.zip.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Update CLIProxyAPI (Linux)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-cliproxyapi-linux
  cancel-in-progress: true

jobs:
  update:
    name: Bump pinned CLIProxyAPI version
    runs-on: ubuntu-latest
    env:
      UPDATE_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN || github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ env.UPDATE_TOKEN }}

      - name: Fetch latest upstream release
        id: upstream
        run: |
          set -euo pipefail
          RELEASE_JSON=$(curl -sf https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not determine latest CLIProxyAPI version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify Linux assets exist
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          TAG="${{ steps.upstream.outputs.tag }}"
          for asset in \
            "CLIProxyAPI_${VERSION}_linux_amd64.tar.gz" \
            "CLIProxyAPI_${VERSION}_linux_arm64.tar.gz" \
            "checksums.txt"; do
            URL="https://github.com/router-for-me/CLIProxyAPI/releases/download/${TAG}/${asset}"
            curl -sfI "$URL" > /dev/null || { echo "::error::Missing upstream asset: $URL"; exit 1; }
          done

      - name: Update PINNED_VERSION in binary.py
        id: bump
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          BIN_PY="src/src/droidproxy/binary.py"
          PREV=$(grep -oE 'PINNED_VERSION = "[^"]+"' "$BIN_PY" | head -n1 | cut -d'"' -f2 || true)
          if [ "$PREV" = "$VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already on $VERSION"
            exit 0
          fi
          sed -i "s/PINNED_VERSION = \"[^\"]*\"/PINNED_VERSION = \"$VERSION\"/" "$BIN_PY"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "previous=$PREV" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.UPDATE_TOKEN }}
          commit-message: 'chore(deps): bump CLIProxyAPI pin to ${{ steps.upstream.outputs.version }}'
          title: 'chore(deps): bump CLIProxyAPI pin to ${{ steps.upstream.outputs.version }}'
          body: |
            Updates the pinned upstream version used by the Linux port from
            `${{ steps.bump.outputs.previous }}` to
            [`${{ steps.upstream.outputs.version }}`](https://github.com/router-for-me/CLIProxyAPI/releases/tag/${{ steps.upstream.outputs.tag }}).

            On first launch, the Linux port downloads the Linux tarball for the
            current architecture and verifies it against the upstream checksums
            file, so no binary is vendored here.

            _Auto-generated by the Linux CLIProxyAPI update workflow._
          branch: bump-cliproxyapi-linux-${{ steps.upstream.outputs.version }}
          delete-branch: true

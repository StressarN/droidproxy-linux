name: Auto Release

on:
  schedule:
    - cron: '30 */12 * * *' # Runs every 12 hours as backup (30 min offset from update-cliproxyapi.yml)
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: true

jobs:
  auto-release:
    runs-on: ubuntu-latest
    env:
      WORKFLOW_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN || github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ env.WORKFLOW_TOKEN }}
          fetch-depth: 0

      - name: Check for open CLIProxyAPIPlus bump PRs
        id: check-pr
        env:
          GH_TOKEN: ${{ env.WORKFLOW_TOKEN }}
        run: |
          set -e
          echo "Checking for open CLIProxyAPIPlus bump PRs..."
          
          # Find open PRs with bump-cliproxyapi- branch prefix
          PR_JSON=$(gh pr list --state open --json number,headRefName,title --jq '.[] | select(.headRefName | startswith("bump-cliproxyapi-"))' | head -1)
          
          if [ -z "$PR_JSON" ]; then
            echo "No open CLIProxyAPIPlus bump PRs found."
            echo "has_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          
          # Extract version from branch name (bump-cliproxyapi-X.Y.Z)
          CLIPROXY_VERSION=$(echo "$PR_BRANCH" | sed 's/bump-cliproxyapi-//')
          
          echo "Found PR #$PR_NUMBER: $PR_TITLE"
          echo "CLIProxyAPIPlus version: $CLIPROXY_VERSION"
          
          echo "has_pr=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "cliproxy_version=$CLIPROXY_VERSION" >> $GITHUB_OUTPUT

      - name: Merge PR
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          GH_TOKEN: ${{ env.WORKFLOW_TOKEN }}
        run: |
          set -e
          PR_NUMBER="${{ steps.check-pr.outputs.pr_number }}"
          
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          
          echo "✅ PR #$PR_NUMBER merged successfully"

      - name: Pull merged changes
        if: steps.check-pr.outputs.has_pr == 'true'
        run: |
          git pull origin main

      - name: Calculate new version
        if: steps.check-pr.outputs.has_pr == 'true'
        id: version
        run: |
          set -e
          
          # Get current version from latest tag
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          CURRENT_VERSION="${CURRENT_TAG#v}"
          
          echo "Current version: $CURRENT_VERSION"
          
          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "New version: $NEW_VERSION"
          
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          CLIPROXY_VERSION: ${{ steps.check-pr.outputs.cliproxy_version }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          PR_NUMBER: ${{ steps.check-pr.outputs.pr_number }}
        run: |
          set -e
          
          TODAY=$(date +%Y-%m-%d)
          
          # Build new changelog entry
          head -n 7 CHANGELOG.md > CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          printf '%s\n' "## [${NEW_VERSION}] - ${TODAY}" >> CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          printf '%s\n' "### Updated" >> CHANGELOG.tmp
          printf '%s\n' "- **CLIProxyAPIPlus ${CLIPROXY_VERSION}** - Latest upstream release (#${PR_NUMBER})" >> CHANGELOG.tmp
          printf '%s\n' "  - Various upstream improvements and stability enhancements" >> CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          tail -n +8 CHANGELOG.md >> CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          
          python3 - <<'PY'
          import os
          from pathlib import Path

          changelog = Path("CHANGELOG.md")
          new_version = os.environ["NEW_VERSION"]
          link_line = f"[{new_version}]: https://github.com/anand-92/droidproxy/releases/tag/v{new_version}"

          lines = changelog.read_text().splitlines()
          insert_at = next((index for index, line in enumerate(lines) if line.startswith("[") and "releases/tag/v" in line), len(lines))
          lines.insert(insert_at, link_line)
          changelog.write_text("\n".join(lines) + "\n")
          PY
          
          echo "CHANGELOG.md updated"
          head -n 20 CHANGELOG.md

      - name: Commit and tag
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          set -e
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git commit -m "Release v$NEW_VERSION"
          
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          
          git push origin main
          git push origin "v$NEW_VERSION"
          
          echo "✅ Created and pushed tag v$NEW_VERSION"

      - name: Trigger release workflow
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          GH_TOKEN: ${{ env.WORKFLOW_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          set -e
          gh workflow run release.yml --ref main -f version="$NEW_VERSION"
          echo "✅ Release workflow dispatched for v$NEW_VERSION"

      - name: Summary
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CLIPROXY_VERSION: ${{ steps.check-pr.outputs.cliproxy_version }}
          PR_NUMBER: ${{ steps.check-pr.outputs.pr_number }}
        run: |
          echo "## Auto Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **PR #$PR_NUMBER merged** - CLIProxyAPIPlus $CLIPROXY_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version bumped** - v$NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **Release workflow dispatched** - Check [Actions](../../actions) for build status" >> $GITHUB_STEP_SUMMARY

name: Linux Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository-2.0-dev gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-dev
      - name: Install package and test deps
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,tray]'
      - name: Run tests
        working-directory: src
        run: python -m pytest -q

  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distributions
        working-directory: src
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: droidproxy-dist
          path: src/dist/*

  appimage:
    name: Build AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install AppImage tooling
        run: |
          python -m pip install --upgrade appimage-builder
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin file desktop-file-utils appstream
      - name: Build AppImage
        working-directory: src/packaging
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          appimage-builder --recipe AppImageBuilder.yml --skip-test
          ls -la
          mv DroidProxyLinux-*.AppImage "DroidProxyLinux-${{ matrix.arch }}.AppImage"
          [ -f DroidProxyLinux-*.AppImage.zsync ] && \
            mv DroidProxyLinux-*.AppImage.zsync "DroidProxyLinux-${{ matrix.arch }}.AppImage.zsync" || true
      - uses: actions/upload-artifact@v4
        with:
          name: droidproxy-${{ matrix.arch }}
          path: |
            src/packaging/DroidProxyLinux-*.AppImage
            src/packaging/DroidProxyLinux-*.AppImage.zsync

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [wheel, appimage]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.whl
            release-assets/**/*.tar.gz
            release-assets/**/*.AppImage
            release-assets/**/*.AppImage.zsync

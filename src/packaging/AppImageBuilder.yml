version: 1

script:
  - mkdir -p AppDir
  - python -m pip install --target=AppDir/usr/lib/python3/dist-packages --no-compile ..
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp ../src/droidproxy/resources/icon-active.png AppDir/droidproxy.png
  - cp ../src/droidproxy/resources/icon-active.png AppDir/usr/share/icons/hicolor/256x256/apps/droidproxy.png

AppDir:
  path: ./AppDir

  app_info:
    id: io.automaze.droidproxy
    name: DroidProxy
    icon: droidproxy
    version: "1.8.16"
    exec: usr/bin/python3.12
    exec_args: >-
      -E -s
      -c "from droidproxy.cli import main; import sys; sys.exit(main())"
      "$@"

  apt:
    arch: amd64
    sources:
      # Ubuntu 24.04 LTS (noble) ships Python 3.12. droidproxy requires 3.11+
      # because it uses tomllib, StrEnum, datetime.UTC, and typing.Self --
      # jammy's Python 3.10 fails at import time with
      # "cannot import name 'UTC' from 'datetime'".
      - sourceline: "deb http://archive.ubuntu.com/ubuntu/ noble main universe"
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C"
    include:
      - python3.12
      - python3.12-minimal
      - python3-gi
      - gir1.2-gtk-3.0
      - gir1.2-ayatanaappindicator3-0.1
      - libglib2.0-0
      - ca-certificates
      - xdg-utils

  files:
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/lib/python3/dist-packages/*/tests/**
      - usr/lib/python3/dist-packages/**/__pycache__/**

AppImage:
  update-information: "gh-releases-zsync|StressarN|droidproxy-linux|latest|DroidProxyLinux-x86_64.AppImage.zsync"
  arch: x86_64
  file_name: DroidProxyLinux-x86_64.AppImage
